name: daily-cycling-news

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC = 06:00 Israel (summer)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit article to Pages
        run: |
          git config user.name "cycling-news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "daily article $(date -u +%F)"
          git push
